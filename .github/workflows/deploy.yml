name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main
      - qa

jobs:

# ================= BUILD =================
  build:
    runs-on: ubuntu-latest

    outputs:
      artifact-name: build-files

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Backend install (sanity check)
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      # Frontend build
      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Upload frontend build
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: frontend/dist

# ================= DEPLOY QA =================
  deploy-qa:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'qa'

    env:
      HOST: ${{ secrets.QA_HOST }}
      TARGET_DIR: /home/ubuntu/Multibranch_Nodejs_Webapp_AutoDeploy

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist

      - name: Get Runner IP
        id: ip
        run: echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Allow SSH
        run: |
          aws ec2 authorize-security-group-ingress \
              --group-id ${{ secrets.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32

      - name: Upload Frontend (QA)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "${{ env.TARGET_DIR }}/frontend/dist"

      - name: Deploy Backend (QA)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}

            echo "Pull latest QA branch"
            git fetch origin
            git reset --hard origin/qa

            cd backend
            npm install

            echo "Restart backend (QA)"
            pm2 restart qa-app || pm2 start server.js --name qa-app

            sudo systemctl reload nginx

      - name: Revoke SSH
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
              --group-id ${{ secrets.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32

# ================= DEPLOY PROD =================
  deploy-prod:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_name == 'main'

    env:
      HOST: ${{ secrets.PROD_HOST }}
      TARGET_DIR: /home/ubuntu/myapp

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist

      - name: Get Runner IP
        id: ip
        run: echo "ip=$(curl -s ifconfig.me)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Allow SSH
        run: |
          aws ec2 authorize-security-group-ingress \
              --group-id ${{ secrets.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32

      - name: Upload Frontend (PROD)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist/*"
          target: "${{ env.TARGET_DIR }}/frontend/dist"

      - name: Deploy Backend (PROD)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ env.TARGET_DIR }}

            echo "Pull latest MAIN branch"
            git fetch origin
            git reset --hard origin/main

            cd backend
            npm install

            echo "Restart backend (PROD)"
            pm2 restart prod-app || pm2 start server.js --name prod-app

            sudo systemctl reload nginx

      - name: Revoke SSH
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
              --group-id ${{ secrets.SG_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.ip.outputs.ip }}/32
